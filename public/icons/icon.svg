<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff41b3"/>
      <stop offset="100%" style="stop-color:#ec723d"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d14"/>
      <stop offset="100%" style="stop-color:#131313"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pill / capsule shape — references the "meds" brand idea -->
  <ellipse cx="256" cy="200" rx="110" ry="52" fill="none" stroke="url(#g)" stroke-width="22"/>
  <!-- Vertical line through pill -->
  <line x1="256" y1="148" x2="256" y2="252" stroke="url(#g)" stroke-width="22" stroke-linecap="round"/>
  <!-- Audio waveform bars below -->
  <rect x="136" y="296" width="20" height="56" rx="10" fill="url(#g)" opacity="0.6"/>
  <rect x="170" y="276" width="20" height="96" rx="10" fill="url(#g)" opacity="0.8"/>
  <rect x="204" y="260" width="20" height="112" rx="10" fill="url(#g)"/>
  <rect x="238" y="280" width="20" height="80" rx="10" fill="url(#g)"/>
  <rect x="272" y="260" width="20" height="112" rx="10" fill="url(#g)"/>
  <rect x="306" y="276" width="20" height="96" rx="10" fill="url(#g)" opacity="0.8"/>
  <rect x="340" y="296" width="20" height="56" rx="10" fill="url(#g)" opacity="0.6"/>
</svg>
